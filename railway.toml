# Railway deployment configuration for Knowledge Arena
# Three services are deployed from this repo:
#   1. app          — FastAPI API server  (this file's default service)
#   2. celery-worker — Celery async task worker
#   3. celery-beat   — Celery periodic scheduler
#
# In the Railway dashboard, add two additional services pointing at the same
# repo and set RAILWAY_DOCKERFILE_TARGET to "celery-worker" / "celery-beat"
# for each of those services.  This file governs the primary API service.

[build]
builder      = "dockerfile"
dockerfilePath = "Dockerfile"
# The "app" stage is the LAST stage in the Dockerfile, so it's the default
# build target. For celery services, set RAILWAY_DOCKERFILE_TARGET env var
# to "celery-worker" or "celery-beat" in the Railway dashboard.

[deploy]
# Start command is defined in the Dockerfile CMD (uses sh -c for variable expansion).
# Do NOT set startCommand here — Railway's exec form doesn't expand $PORT for
# Dockerfile deployments, causing it to be passed as a literal string.
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path    = "/health"
timeout = 30        # seconds Railway waits for a 2xx before marking unhealthy
interval = 10       # seconds between probes
